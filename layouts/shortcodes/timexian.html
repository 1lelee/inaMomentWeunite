{{- $date := .Get "date" -}}
{{- $id := $date | urlize -}}
{{- $isUrgent := .Get "urgent" -}}
{{- $color := "#222" -}}
{{- if eq $isUrgent "true" -}}
    {{- $color = "#f44336" -}}
{{- end -}}

<div class="timeline-wrapper" style="position: relative; padding-left: 25px; border-left: 2px solid #ddd; margin-left: 10px; padding-bottom: 20px;">
    <div style="position: absolute; left: -6px; top: 12px; width: 10px; height: 10px; border-radius: 50%; background-color: {{ $color | safeCSS }}; z-index: 2;"></div>
    
    <h2 id="{{ $id }}" style="margin: 0; padding: 0; border: none; line-height: 1;">
        <span style="font-weight: bold; color: #ffffff; padding: 3px 12px; border-radius: 15px; font-size: 0.7em; display: inline-block; background-color: {{ $color | safeCSS }}; margin-bottom: 10px;">
            {{ $date }}
        </span>
    </h2>
    
    <div style="line-height: 1.5; color: #333; font-size: 0.95em; letter-spacing: -0.02em; margin-top: 5px;">
        {{ .Inner | markdownify }}
    </div>
</div>
