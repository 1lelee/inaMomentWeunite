{{- $date := .Get "date" -}}
{{- $id := $date | urlize -}}
{{- $isUrgent := .Get "urgent" -}}
{{- $color := "#222" -}}
{{- if eq $isUrgent "true" -}}
    {{- $color = "#f44336" -}}
{{- end -}}

<div class="timeline-wrapper" style="position: relative; padding-left: 20px; border-left: 2px solid #ddd; margin-left: 10px; padding-bottom: 25px;">
    
    <div style="display: inline-flex; align-items: center; transform: translateX(-26px); margin-bottom: 10px; vertical-align: top;">
        
        <div style="width: 10px; height: 10px; border-radius: 50%; background-color: {{ $color | safeCSS }}; z-index: 2; flex-shrink: 0;"></div>
        
        <h2 id="{{ $id }}" style="margin: 0; padding: 0; border: none; line-height: 1; margin-left: 16px; display: inline-block;">
            <span style="font-weight: bold; color: #ffffff; padding: 3px 10px; border-radius: 15px; font-size: 0.7em; background-color: {{ $color | safeCSS }}; white-space: nowrap;">
                {{ $date }}
            </span>
        </h2>
    </div>
    
    <div style="display: inline; line-height: 1.6; color: #333; font-size: 0.95em; vertical-align: middle; margin-left: -15px;">
        {{ .Inner | markdownify }}
    </div>
</div>
